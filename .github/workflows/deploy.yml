name: Build, Scan, Push and Deploy jmzops

# Builds the Docker image, runs a Trivy vulnerability scan against it

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write 

env:
  REGION: us-central1
  REPOSITORY: networking-app
  IMAGE_NAME: jmzops
  REGISTRY_HOST: networking-app
  CONTAINER_NAME: jmzops
  HOST_PORT: 5000
  DB_PORT: 3306
  DB_NAME: appdb

jobs:

# The Build, scan and push part of the ci/cd pipeline.
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Compute image reference
        id: vars
        run: |
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "::error::GCP_PROJECT_ID secret is empty or unset — the image reference would be malformed (e.g. '.../networking-app/jmzops' with no project segment, which Docker rejects with 'invalid reference format'). Set it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}"
          echo "Computed image reference: $IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t "${{ steps.vars.outputs.image }}:${{ github.sha }}" .

      - name: Trivy scan with full report (CRITICAL, HIGH, MEDIUM)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.vars.outputs.image }}:${{ github.sha }}"
          format: sarif
          output: trivy-results.sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"

      - name: Upload Trivy report to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy scan — gate on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ steps.vars.outputs.image }}:${{ github.sha }}"
          format: table
          severity: "CRITICAL"
          exit-code: "1"
          ignore-unfixed: true

      - name: Push Docker image to GCP Artifact Registry
        run: docker push "${{ steps.vars.outputs.image }}:${{ github.sha }}"

# The Deploy part of the ci/cd pipeline.
  deploy:
    name: Deploy to app VM
    needs: build-scan-push
    runs-on: ubuntu-latest
    environment: production
    env:
      DOCKER_CONTEXT: vm
    steps:
      - name: Compute image reference for the deploy step
        run: |
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "::error::GCP_PROJECT_ID secret is empty or unset — set it in repo Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "IMAGE_TAG=${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG set for the rest of this job."

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Configure SSH key for GCP App Instance
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.GCP_VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Point Docker at the app Instance using SSH (Docker context)
        run: docker context create vm --docker "host=ssh://${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOST }}"

      - name: Write container env file for the app Instance
        run: |
          cat > jmzops.env << EOF
          PORT=3000
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ env.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ env.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Deploy the new docker image to the app Instance
        run: |
          echo "Deploying ${{ env.IMAGE_TAG }}"

          docker pull "${{ env.IMAGE_TAG }}"

          docker stop "${{ env.CONTAINER_NAME }}" 2>/dev/null || true
          docker rm "${{ env.CONTAINER_NAME }}" 2>/dev/null || true

          docker run -d \
            --name "${{ env.CONTAINER_NAME }}" \
            --restart unless-stopped \
            -p "${{ env.HOST_PORT }}:3000" \
            --env-file jmzops.env \
            "${{ env.IMAGE_TAG }}"

          docker image prune -f || true

      - name: Remove the Docker context after the deploy step
        if: always()
        run: docker context rm -f vm || true

      - name: Smoke test to ensure the app is up and healthy after the deploy step
        run: |
          sleep 8
          curl -fsS "http://${{ secrets.GCP_VM_HOST }}:${{ env.HOST_PORT }}/" > /dev/null \
            && echo "jmzops responded on port ${{ env.HOST_PORT }}" \
            || (echo "Smoke test failed" && exit 1)
